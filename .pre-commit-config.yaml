minimum_pre_commit_version: "4.0.0"
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix --exit-non-zero-on-fix
        language: system
        types_or:
          - python
          - pyi
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or:
          - python
          - pyi
